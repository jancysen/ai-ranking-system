# Configuration for AI-Powered Candidate Ranking System

participant_id: "team_antigravity"
candidates_file: "data/candidates.jsonl"
output_file: "outputs/team_antigravity.csv"

# Weights for base scoring components (must sum to 1.0)
weights:
  skills: 0.35          # Technical skills & endorsements alignment
  title: 0.25           # Professional title history relevance
  experience: 0.15      # Seniority & years of experience alignment
  education: 0.10       # Education tiering (tier_1 to tier_4)
  location: 0.10        # Noida/Pune proximity & relocation preference
  notice_period: 0.05   # Notice period / availability match

# Weight for Stage 2 semantic similarity blending (0.0 to 1.0)
# Final Score = (1 - semantic_re_rank_weight) * Stage 1 + semantic_re_rank_weight * Cosine Similarity
semantic_re_rank_weight: 0.2


# Excluded consulting/service companies (disqualified if entire history is with these)
excluded_companies:
  - "tcs"
  - "tata consultancy services"
  - "infosys"
  - "wipro"
  - "accenture"
  - "cognizant"
  - "capgemini"
  - "hcl"
  - "hcltech"
  - "tech mahindra"
  - "cognizant technology solutions"
  - "wipro technologies"
  - "infosys technologies"

# Recency multipliers for candidate ranking (days inactive thresholds mapped to multipliers)
recency_multipliers:
  30: 1.15       # <= 30 days inactive
  90: 1.05       # <= 90 days inactive
  180: 0.85      # <= 180 days inactive
  default: 0.50  # > 180 days inactive (default multiplier)

# Top Indian Engineering Institutions for tier mapping fallback if unspecified
education_prestige_mappings:
  tier_1:
    - "indian institute of technology"
    - "iit"
    - "bits pilani"
    - "birla institute of technology and science"
    - "indian institute of science"
    - "iisc"
  tier_2:
    - "national institute of technology"
    - "nit"
    - "delhi technological university"
    - "dtu"
    - "netaji subhas institute of technology"
    - "nsit"
    - "iiit"
    - "indian institute of information technology"
    - "bits"
    - "vit"
    - "vellore institute of technology"
    - "manipal institute of technology"
    - "college of engineering, guindy"
    - "jadavpur university"
    - "anna university"
    - "psg college of technology"
    - "rv college of engineering"


